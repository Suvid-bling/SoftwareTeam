<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SdeTeam</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="bg-gray-950 text-gray-100 h-screen flex flex-col overflow-hidden">

  <!-- Top bar -->
  <header class="flex items-center justify-between px-5 py-3 bg-gray-900 border-b border-gray-800 shrink-0">
    <h1 class="text-lg font-semibold tracking-tight">🛠 SdeTeam</h1>
    <span id="status-badge" class="text-xs px-2 py-0.5 rounded-full bg-gray-700">Idle</span>
  </header>

  <!-- Main 3-column layout -->
  <div class="flex flex-1 overflow-hidden">

    <!-- LEFT: Hire panel -->
    <aside id="hire-panel" class="w-64 shrink-0 border-r border-gray-800 bg-gray-900 flex flex-col">
      <div class="px-4 py-3 border-b border-gray-800 space-y-2">
        <h2 class="text-sm font-semibold uppercase tracking-wide text-gray-400">Hire Roles</h2>
        <!-- Mode switch -->
        <div class="flex rounded-lg overflow-hidden border border-gray-700">
          <button id="mode-pipeline" class="flex-1 px-2 py-1.5 text-xs font-medium bg-blue-600 text-white transition">
            ⛓ Pipeline
          </button>
          <button id="mode-teamleader" class="flex-1 px-2 py-1.5 text-xs font-medium bg-gray-800 text-gray-400 hover:text-gray-200 transition">
            👑 TeamLeader
          </button>
        </div>
      </div>
      <div id="role-list" class="flex-1 overflow-y-auto p-3 space-y-2"></div>
      <div class="p-3 border-t border-gray-800 space-y-2">
        <label class="block text-xs text-gray-400">
          Budget ($)
          <input id="investment" type="number" value="10" min="1" step="1"
                 class="mt-1 w-full rounded bg-gray-800 border border-gray-700 px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500" />
        </label>
      </div>
    </aside>

    <!-- CENTER: Chat + Terminal with tabs -->
    <main class="flex-1 flex flex-col min-w-0">
      <!-- Tab bar -->
      <div class="flex border-b border-gray-800 bg-gray-900 shrink-0">
        <button id="tab-chat" class="tab-btn active px-4 py-2 text-sm font-medium border-b-2 border-blue-500 text-blue-400">
          💬 Chat
        </button>
        <button id="tab-terminal" class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-300">
          🖥 Terminal
        </button>
        <button id="tab-agents" class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-300">
          🤖 Agent Process
        </button>
      </div>

      <!-- Chat panel -->
      <div id="panel-chat" class="flex-1 flex flex-col min-h-0">
        <div id="chat-log" class="flex-1 overflow-y-auto p-4 space-y-2 font-mono text-sm leading-relaxed"></div>
        <form id="chat-form" class="shrink-0 border-t border-gray-800 bg-gray-900 p-3 flex gap-2">
          <textarea id="idea-input" rows="3" placeholder="Describe what you want to build…"
                    class="flex-1 rounded-lg bg-gray-800 border border-gray-700 px-3 py-2 text-sm resize-none focus:outline-none focus:ring-1 focus:ring-blue-500"></textarea>
          <div class="flex flex-col gap-2">
            <button type="submit" id="btn-run"
                    class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-500 text-sm font-medium transition">
              Run ▶
            </button>
            <button type="button" id="btn-stop"
                    class="px-4 py-2 rounded-lg bg-red-700 hover:bg-red-600 text-sm font-medium transition hidden">
              Stop ■
            </button>
          </div>
        </form>
      </div>

      <!-- Terminal panel -->
      <div id="panel-terminal" class="flex-1 flex flex-col min-h-0 hidden">
        <div id="terminal-output" class="flex-1 overflow-y-auto p-4 font-mono text-sm text-green-300 bg-black leading-relaxed whitespace-pre-wrap"></div>
        <div class="shrink-0 border-t border-gray-800 bg-gray-900 p-3 flex gap-2">
          <input id="terminal-input" type="text" placeholder="Type command…"
                 class="flex-1 rounded-lg bg-gray-800 border border-gray-700 px-3 py-2 text-sm font-mono focus:outline-none focus:ring-1 focus:ring-green-500" />
          <button id="btn-send-cmd" class="px-4 py-2 rounded-lg bg-green-700 hover:bg-green-600 text-sm font-medium transition">
            Send
          </button>
        </div>
      </div>

      <!-- Agent Process panel -->
      <div id="panel-agents" class="flex-1 flex flex-col min-h-0 hidden">
        <!-- Horizontal slider of role cards -->
        <div id="agent-slider-wrap" class="shrink-0 border-b border-gray-800 bg-gray-900 relative">
          <div id="agent-slider" class="flex overflow-x-auto gap-2 p-3 scroll-smooth agent-slider"></div>
          <div class="absolute right-2 top-1/2 -translate-y-1/2 flex gap-1">
            <button id="slider-left" class="w-6 h-6 rounded bg-gray-700 hover:bg-gray-600 text-xs flex items-center justify-center">‹</button>
            <button id="slider-right" class="w-6 h-6 rounded bg-gray-700 hover:bg-gray-600 text-xs flex items-center justify-center">›</button>
          </div>
        </div>
        <!-- Role log display area: up to 5 visible at once -->
        <div id="agent-logs-grid" class="flex-1 overflow-y-auto p-3 grid gap-3" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); max-height: 100%;"></div>
        <div id="agent-empty" class="flex-1 flex items-center justify-center text-gray-600 text-sm italic hidden">
          No active roles. Start a team run first.
        </div>
      </div>
    </main>

    <!-- RIGHT: File viewer -->
    <aside id="file-panel" class="w-72 shrink-0 border-l border-gray-800 bg-gray-900 flex flex-col">
      <div class="px-4 py-3 border-b border-gray-800 flex items-center justify-between">
        <h2 class="text-sm font-semibold uppercase tracking-wide text-gray-400">Workspace Files</h2>
        <button id="btn-refresh-files" class="text-xs text-blue-400 hover:text-blue-300">↻ Refresh</button>
      </div>
      <div id="file-tree" class="flex-1 overflow-y-auto p-3 text-sm space-y-1"></div>
      <!-- File content preview -->
      <div id="file-preview" class="hidden border-t border-gray-800 max-h-[40%] overflow-y-auto">
        <div class="flex items-center justify-between px-3 py-2 bg-gray-800">
          <span id="preview-filename" class="text-xs text-gray-400 truncate"></span>
          <button id="btn-close-preview" class="text-xs text-gray-500 hover:text-gray-300">✕</button>
        </div>
        <pre id="preview-content" class="px-3 py-2 text-xs whitespace-pre-wrap break-words font-mono text-gray-300"></pre>
      </div>
    </aside>
  </div>

  <!-- Right-click context menu -->
  <div id="context-menu" class="hidden fixed z-50 bg-gray-800 border border-gray-700 rounded-lg shadow-xl py-1 min-w-[160px]">
    <button id="ctx-run" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-700 flex items-center gap-2">
      <span class="text-green-400 text-base">▶</span> Run File
    </button>
    <button id="ctx-stop" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-700 flex items-center gap-2 hidden">
      <span class="text-red-400 text-base">■</span> Stop Process
    </button>
  </div>

  <!-- Hover tooltip for full content -->
  <div id="log-tooltip" class="hidden fixed z-[100] max-w-[500px] max-h-[400px] overflow-y-auto
       bg-yellow-50 text-gray-900 text-xs font-mono p-3 rounded-lg shadow-2xl border border-yellow-300
       whitespace-pre-wrap break-words"></div>

  <script src="/static/app.js"></script>
</body>
</html>
